name: fash_food
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.0.0
  equatable: ^2.0.5
  get_it: ^8.0.0
  dio: ^5.7.0
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  google_sign_in: ^6.2.0
  flutter_facebook_auth: ^7.1.1
  go_router: ^16.0.0
  cupertino_icons: ^1.0.8
  uuid: ^4.5.1
  intl: ^0.20.2
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/google.png
    - assets/icons/facebook.png
    - assets/images/logo.png
    - assets/images/categories/burger.png
    - assets/images/categories/pizza.png
    - assets/images/categories/an_vat.png
    - assets/images/categories/do_uong.png
    - assets/images/categories/mi_y.png
    - assets/images/categories/ga_ran.png
    - assets/images/categories/kimbap.png
    - assets/images/categories/lau.png
    - assets/images/categories/trang_miem.png
    - assets/images/categories/banh_mi.png
